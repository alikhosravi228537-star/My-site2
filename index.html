<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلود کانفیگ | نپستر و ویتوری</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

            <h1>📡 دانلود کانفیگ</h1>
            <p>به‌روزرسانی روزانه</p>
            <div id="update-time" class="update-badge"></div>
        </header>

        <section>
            <h2>کانفیگ‌های ویتوری</h2>
            <div id="v2ray-list" class="card-grid"></div>

        <section>
            <h2>کانفیگ‌های نپستر</h2>
            <div id="vpn-list" class="card-grid"></div>
        </section>

        <section>
            <h2>برنامه‌های مورد نیاز</h2>
            <div id="apk-list" class="card-grid"></div>
        </section>

        <section>
            <h2>پروکسی‌ها</h2>
            <div id="proxy-list" class="card-grid"></div>
        </section>

        <footer>
            <p>✨ طراحی شده توسط علی گنگشتر ✨</p>
        </footer>
    </div>
    <script src="script.js"></script>

</html>
